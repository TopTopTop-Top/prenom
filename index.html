<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prénom Party Game</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="badge">INSEE Party Edition</p>
        <h1>Prénom Clash</h1>
        <p class="subtitle">
          Défie tes amis sur les prénoms français, en local sur un même portable
        </p>
      </header>

      <section class="card glass">
        <h2>Paramètres</h2>
        <div class="row">
          <label for="players">Joueurs (séparés par virgule)</label>
          <input id="players" value="Alice,Bob,Charlie" />
        </div>
        <div class="row">
          <label for="targetScore">Score pour gagner</label>
          <input id="targetScore" type="number" value="15" min="5" max="100" />
        </div>
        <div class="row">
          <label for="difficulty">Niveau (années / périodes)</label>
          <select id="difficulty">
            <option value="normal" selected>Normal</option>
            <option value="easy">Facile — grandes différences</option>
            <option value="hard">Difficile — années très proches</option>
            <option value="mixed">Mixte — varie à chaque manche</option>
          </select>
        </div>
        <button id="startBtn" class="btn-primary">Lancer la partie</button>
      </section>

      <section id="gameSection" class="card game-card hidden">
        <div class="topbar">
          <h2 id="roundTitle"></h2>
          <span id="turnPill" class="turn-pill"></span>
        </div>
        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="roundDescription" class="round-prompt"></p>
        <div id="contextVisual" class="context-visual hidden" aria-live="polite">
          <div id="geoBlock" class="context-block geo-block hidden">
            <p class="context-heading">Où c’est sur la carte ?</p>
            <p id="geoHint" class="geo-hint"></p>
            <div id="leafletMap" class="leaflet-map" role="img" aria-label="Carte"></div>
            <div class="geo-links">
              <a id="geoLinkOsm" class="geo-link" target="_blank" rel="noopener noreferrer"
                >Ouvrir dans OpenStreetMap</a
              >
              <a id="geoLinkGmaps" class="geo-link" target="_blank" rel="noopener noreferrer"
                >Ouvrir dans Google&nbsp;Maps</a
              >
            </div>
          </div>
          <div id="chartBlock" class="context-block chart-block hidden">
            <p id="chartCaption" class="context-heading"></p>
            <div class="timeline-canvas-wrap">
              <canvas id="timelineCanvas" width="600" height="210"></canvas>
            </div>
            <div id="chartLegend" class="chart-legend"></div>
          </div>
        </div>
        <div id="answerArea" class="answer-grid"></div>
        <p id="feedback" class="feedback"></p>
        <button id="nextRoundBtn" class="btn-secondary">Manche suivante</button>
      </section>

      <section class="card glass">
        <h2>Scores</h2>
        <ul id="scoreBoard"></ul>
      </section>
    </main>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./src/app.js?v=20260414-1"></script>
  </body>
</html>
